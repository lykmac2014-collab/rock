<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радиоактивная кнопка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
        }

        .sound-button {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 12px solid #222;
            /* ВАЖНО: Название файла должно совпадать до символа */
            background-image: url('Кнопка.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: transform 0.05s;
            outline: none;
            background-color: transparent; /* Убрали красный фон */
        }

        .sound-button:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <button class="sound-button" onclick="playSound()"></button>

    <audio id="meme-sound" src="планктон ааа мем.mp3"></audio>

    <script>
        function playSound() {
            const audio = document.getElementById('meme-sound');
            audio.currentTime = 0; 
            audio.play().catch(e => console.log("Ошибка воспроизведения:", e));
        }
    </script>

</body>
</html>
